# =============================================================================
# TurkeyMed — nginx performance config for Laravel Forge
# =============================================================================
# WHERE: Forge → your site → Edit Files → "Edit Nginx Configuration".
# Paste the two `location` blocks below ABOVE the existing `location / { ... }`
# block (nginx matches `^~` and regex locations before the generic `/`).
# This config persists across deploys (it's separate from the app code).
#
# WHY: Vite fingerprints everything in /build/ (e.g. app-BUZ3ti1l.css), so those
# files can be cached forever — a new deploy produces new filenames. Other root
# static files (favicons, og-default.png) aren't hashed, so they get a long but
# revalidatable cache instead.
#
# NOTE: we use a single `add_header Cache-Control ...` rather than nginx's
# `expires` directive, because combining the two emits duplicate Cache-Control
# headers.
# =============================================================================

# Content-hashed Vite build assets (JS, CSS, self-hosted fonts) — immutable 1y.
location ^~ /build/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
    try_files $uri =404;
}

# Root static files (favicons, og image, svg, stray images/fonts) — 30 days.
location ~* \.(?:svg|png|jpe?g|webp|avif|gif|ico|woff2?|ttf|otf|eot)$ {
    add_header Cache-Control "public, max-age=2592000";
    access_log off;
}

# -----------------------------------------------------------------------------
# REQUIRED EDIT: robots.txt is now served dynamically by Laravel (it respects
# SITE_INDEXABLE and prints the correct sitemap host). Forge's default config
# ships this exact-match block:
#
#     location = /robots.txt  { access_log off; log_not_found off; }
#
# With no static public/robots.txt file, that block returns 404 and never
# reaches PHP. FIND that line in the Forge nginx config and REPLACE it with the
# version below (adds try_files so it falls through to the app):
location = /robots.txt {
    access_log off;
    log_not_found off;
    try_files $uri /index.php?$query_string;
}

# =============================================================================
# Compression
# =============================================================================
# Gzip: Forge enables `gzip on` globally already. To be sure the right types are
# compressed, you can add this inside the `server { ... }` block:
#
#   gzip_types text/plain text/css text/javascript application/javascript
#              application/json application/xml application/rss+xml
#              image/svg+xml application/manifest+json font/ttf font/otf;
#   gzip_vary on;
#
# Brotli (bigger win than gzip): NOT compiled into Forge's stock nginx.
#   - Recommended: put Cloudflare in front → Brotli + HTTP/3 + edge caching,
#     no nginx changes needed.
#   - Or: install ngx_brotli via a Forge recipe, then add:
#       brotli on;
#       brotli_comp_level 5;
#       brotli_types text/plain text/css text/javascript application/javascript
#                    application/json application/xml image/svg+xml font/ttf font/otf;
#   Do NOT naively enable both Brotli and Gzip filters in a way that chains them.
# =============================================================================
